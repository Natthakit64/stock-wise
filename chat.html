<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>แชทกับ AI — StockWise</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    nav { flex-shrink: 0; }

    .chat-layout {
      flex: 1;
      display: grid;
      grid-template-columns: 280px 1fr;
      overflow: hidden;
    }

    /* ─── SIDEBAR ─── */
    .chat-sidebar {
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-sidebar-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--egg);
    }

    .chat-sidebar-header h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--accent-dark);
    }

    .chat-sidebar-header p {
      font-size: 0.78rem;
      color: var(--text-light);
      margin-top: 0.2rem;
    }

    /* Model selector */
    .model-select-wrap {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .model-select-wrap label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-light);
      display: block;
      margin-bottom: 0.4rem;
    }

    .model-select {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      font-family: 'Sarabun', sans-serif;
      font-size: 0.8rem;
      color: var(--text);
      outline: none;
      cursor: pointer;
    }

    /* Quick prompts */
    .quick-prompts {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.5rem;
    }

    .quick-prompts-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-light);
      margin-bottom: 0.75rem;
    }

    .quick-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 0.65rem 0.85rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'Sarabun', sans-serif;
      font-size: 0.82rem;
      color: var(--text-muted);
      cursor: pointer;
      margin-bottom: 0.5rem;
      transition: all 0.15s;
      line-height: 1.4;
    }

    .quick-btn:hover {
      border-color: var(--accent-light);
      background: var(--egg);
      color: var(--accent-dark);
    }

    .sidebar-bottom {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .clear-btn {
      width: 100%;
      padding: 0.6rem;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'Sarabun', sans-serif;
      font-size: 0.82rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .clear-btn:hover { border-color: var(--red); color: var(--red); }

    .session-info {
      font-size: 0.7rem;
      color: var(--text-light);
      text-align: center;
    }

    /* ─── CHAT AREA ─── */
    .chat-main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* Welcome screen */
    .welcome-screen {
      margin: auto;
      text-align: center;
      max-width: 420px;
      padding: 2rem;
    }

    .welcome-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .welcome-screen h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--accent-dark);
      margin-bottom: 0.5rem;
    }

    .welcome-screen p {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.7;
    }

    /* Messages */
    .message {
      display: flex;
      gap: 0.75rem;
      max-width: 80%;
      animation: fadeUp 0.2s ease;
    }

    .message.user { margin-left: auto; flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .message.user .msg-avatar   { background: var(--accent); color: #fff; font-size: 0.75rem; }
    .message.ai    .msg-avatar  { background: var(--egg); border: 1px solid var(--border); }

    .msg-bubble {
      padding: 0.9rem 1.1rem;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.7;
    }

    .message.user .msg-bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.ai .msg-bubble {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    /* Typing indicator */
    .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 0.5rem 0; }
    .typing-dot {
      width: 7px; height: 7px;
      background: var(--accent-light);
      border-radius: 50%;
      animation: typingBounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Input area */
    .chat-input-area {
      padding: 1rem 1.5rem 1.25rem;
      border-top: 1px solid var(--border);
      background: var(--card);
    }

    .error-msg {
      display: none;
      padding: 0.5rem 0.75rem;
      border-radius: var(--radius-sm);
      border: 1px solid;
      font-size: 0.82rem;
      margin-bottom: 0.75rem;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
    }

    .chat-textarea {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      font-family: 'Sarabun', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
      transition: border-color 0.15s;
    }

    .chat-textarea:focus { border-color: var(--accent-light); }

    .send-btn {
      padding: 0.75rem 1rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .send-btn:hover:not(:disabled) { background: var(--accent-dark); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .input-hint {
      font-size: 0.72rem;
      color: var(--text-light);
      margin-top: 0.4rem;
      text-align: right;
    }
  </style>
</head>
<body>

<nav><!-- navbar เดิม --></nav>

<div class="chat-layout">

  <!-- SIDEBAR -->
  <div class="chat-sidebar">
    <div class="chat-sidebar-header">
      <h3>🤖 StockWise AI</h3>
      <p>ผู้ช่วยด้านการเทรดหุ้นและการลงทุน</p>
    </div>

    <!-- Model Selector -->
    <div class="model-select-wrap">
      <label>โมเดล AI</label>
      <select class="model-select" id="modelSelect">
        <option value="nvidia/nemotron-3-super-120b-a12b:free">nemotron-3-super-120b-a12b:free</option>
        <option value="poolside/laguna-xs.2:free">laguna-xs.2:free</option>
        <option value="google/gemma-4-31b-it:free">gemma-4-26b-a4b-it:free</option>
        <option value="google/gemma-4-26b-a4b-it:free">gemma-4-31b-it:free</option>
      </select>
    </div>

    <!-- Quick Prompts -->
    <div class="quick-prompts">
      <div class="quick-prompts-title">คำถามแนะนำ</div>
      <button class="quick-btn" onclick="usePrompt(this.textContent)">📊 แท่งเทียน Doji หมายความว่าอะไร?</button>
      <button class="quick-btn" onclick="usePrompt(this.textContent)">📈 Moving Average 50 กับ 200 ต่างกันอย่างไร?</button>
      <button class="quick-btn" onclick="usePrompt(this.textContent)">🛡️ การ Stop Loss ควรวางที่ไหน?</button>
      <button class="quick-btn" onclick="usePrompt(this.textContent)">⚡ Trend Following คืออะไร ใช้ยังไง?</button>
      <button class="quick-btn" onclick="usePrompt(this.textContent)">🎯 RSI 70 หมายความว่าหุ้น Overbought ไหม?</button>
      <button class="quick-btn" onclick="usePrompt(this.textContent)">🤔 ความแตกต่างระหว่าง Technical กับ Fundamental Analysis</button>
      <button class="quick-btn" onclick="usePrompt(this.textContent)">💡 P/E Ratio คืออะไร สูงหรือต่ำดีกว่ากัน?</button>
      <button class="quick-btn" onclick="usePrompt(this.textContent)">🧠 FOMO ในการเทรดคืออะไร จัดการยังไง?</button>
    </div>

    <div class="sidebar-bottom">
      <button class="clear-btn" onclick="clearChat()">🗑️ ล้างบทสนทนา</button>
      <div class="session-info" id="sessionInfo">กำลังโหลด...</div>
    </div>
  </div>

  <!-- CHAT MAIN -->
  <div class="chat-main">
    <div class="chat-messages" id="chatMessages">
      <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-icon">🤖</div>
        <h2>สวัสดีครับ! ผม StockWise AI</h2>
        <p>
          ถามคำถามเกี่ยวกับการเทรดหุ้น การอ่านกราฟ เทคนิคต่าง ๆ
          หรือแนวคิดการลงทุนได้เลยครับ
        </p>
        <p style="margin-top:0.5rem;font-size:0.8rem;color:var(--text-light)">
          ⚠️ AI ไม่แนะนำหุ้นเฉพาะเจาะจง เนื้อหาเพื่อการศึกษาเท่านั้น
        </p>
      </div>
    </div>

    <div class="chat-input-area">
      <div id="errorMsg" class="error-msg"></div>
      <div class="input-row">
        <textarea
          id="chatInput"
          class="chat-textarea"
          rows="1"
          placeholder="ถามเกี่ยวกับการเทรดหุ้น..."
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
      <div class="input-hint">Enter ส่งข้อความ · Shift+Enter ขึ้นบรรทัดใหม่</div>
    </div>
  </div>
</div>

<script src="main.js"></script>
<script>
const SYSTEM_PROMPT = `คุณคือ StockWise AI ผู้ช่วยด้านการศึกษาการเทรดหุ้นและการลงทุน 
ตอบเป็นภาษาไทยเสมอ ใช้ภาษาที่เข้าใจง่าย เป็นมิตร และให้ข้อมูลที่ถูกต้อง

คุณช่วยอธิบายเรื่อง: Technical Analysis, Fundamental Analysis, Chart Patterns, 
Risk Management, Trading Psychology, indicators ต่าง ๆ และแนวคิดการลงทุน

สิ่งที่ห้ามทำ:
- ไม่แนะนำหุ้นเฉพาะเจาะจงให้ซื้อหรือขาย
- ไม่บอกราคาเป้าหมายหรือการพยากรณ์ราคา
- ไม่รับผิดชอบต่อผลขาดทุนใด ๆ 
- ให้เตือนเสมอว่าการลงทุนมีความเสี่ยง 
ตอบกระชับ ชัดเจน ใช้ emoji ได้บ้างเพื่อความน่าอ่าน`;

// ─── SESSION MANAGEMENT ───
// สร้าง UUID แบบง่าย (ไม่ต้องพึ่ง crypto library)
function generateUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function getOrCreateSession() {
  let sid = localStorage.getItem('stockwise_session_id');
  if (!sid) {
    sid = generateUUID();
    localStorage.setItem('stockwise_session_id', sid);
  }
  return sid;
}

const SESSION_ID = getOrCreateSession();

// แสดง session info ย่อๆ ใน sidebar
document.getElementById('sessionInfo').textContent =
  `Session: ${SESSION_ID.slice(0, 8)}... · ประวัติ 3 วัน`;

// ─── STATE ───
let messages  = []; // เก็บ context สำหรับส่งไป API (เฉพาะ session ปัจจุบัน)
let isLoading = false;

// ─── โหลดประวัติแชทจาก DB ───
async function loadHistory() {
  try {
    const res = await fetch(`/api/chat?session_id=${SESSION_ID}`);
    if (!res.ok) return;
    const data = await res.json();
    const history = data.history || [];
    if (!history.length) return;

    // ลบ welcome screen
    document.getElementById('welcomeScreen')?.remove();

    // render ประวัติ
    history.forEach(m => addMessage(m.role === 'assistant' ? 'ai' : 'user', m.content, false));

    // เก็บเป็น context (เพื่อให้ AI มี memory ใน session นี้)
    messages = history.map(m => ({
      role: m.role,
      content: m.content,
    }));

  } catch (e) {
    console.warn('[loadHistory]', e);
  }
}

// ─── SEND ───
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text  = input.value.trim();
  if (!text || isLoading) return;

  hideError();
  addMessage('user', text);
  input.value = '';
  input.style.height = 'auto';
  messages.push({ role: 'user', content: text });

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  const typingId = addTyping();
  document.getElementById('welcomeScreen')?.remove();

  const model = document.getElementById('modelSelect').value;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model,
        session_id: SESSION_ID,
        system_prompt: SYSTEM_PROMPT,
        messages,
      }),
    });

    const data = await res.json();

    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

    const reply = data.choices?.[0]?.message?.content || '(ไม่ได้รับคำตอบ)';
    removeTyping(typingId);
    addMessage('ai', reply);
    messages.push({ role: 'assistant', content: reply });

  } catch (err) {
    removeTyping(typingId);
    showError(`❌ เกิดข้อผิดพลาด: ${err.message}`);
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}

// ─── UI HELPERS ───
function addMessage(role, text, animate = true) {
  const wrap = document.getElementById('chatMessages');
  const div  = document.createElement('div');
  div.className = `message ${role}${animate ? '' : ''}`;
  if (!animate) div.style.animation = 'none';
  div.innerHTML = `
    <div class="msg-avatar">${role === 'user' ? '👤' : '🤖'}</div>
    <div class="msg-bubble">${escapeAndFormat(text)}</div>
  `;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return div;
}

function addTyping() {
  const wrap = document.getElementById('chatMessages');
  const id   = 'typing-' + Date.now();
  const div  = document.createElement('div');
  div.id = id;
  div.className = 'message ai';
  div.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div class="msg-bubble">
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  `;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return id;
}

function removeTyping(id)  { document.getElementById(id)?.remove(); }

function showError(msg, color = 'red') {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.background = color === 'green' ? '#EAF4EE' : '#FAEAEA';
  el.style.borderColor = color === 'green' ? '#A0D0A8' : '#F0B0B0';
  el.style.color       = color === 'green' ? 'var(--green)' : 'var(--red)';
  setTimeout(() => el.style.display = 'none', 4000);
}

function hideError() { document.getElementById('errorMsg').style.display = 'none'; }

function clearChat() {
  messages = [];
  const wrap = document.getElementById('chatMessages');
  wrap.innerHTML = `
    <div class="welcome-screen" id="welcomeScreen">
      <div class="welcome-icon">🤖</div>
      <h2>สวัสดีครับ! ผม StockWise AI</h2>
      <p>ถามคำถามเกี่ยวกับการเทรดหุ้น การอ่านกราฟ เทคนิคต่าง ๆ หรือแนวคิดการลงทุนได้เลยครับ</p>
      <p style="margin-top:0.5rem;font-size:0.8rem;color:var(--text-light)">⚠️ AI ไม่แนะนำหุ้นเฉพาะเจาะจง เนื้อหาเพื่อการศึกษาเท่านั้น</p>
    </div>`;
  // หมายเหตุ: ไม่ลบ session ออกจาก DB เพราะแค่ clear หน้าจอ
  // ถ้าอยากลบประวัติถาวร สามารถเพิ่ม endpoint DELETE /api/chat?session_id=xxx ได้ในอนาคต
}

function usePrompt(text) {
  const input = document.getElementById('chatInput');
  input.value = text;
  autoResize(input);
  input.focus();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function escapeAndFormat(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/`(.*?)`/g,'<code style="background:var(--egg);padding:0.1rem 0.3rem;border-radius:3px;font-size:0.85em">$1</code>')
    .replace(/\n/g,'<br/>');
}

// ─── INIT ───
loadHistory();
</script>
</body>
</html>
